namespace: rev-argocd2

replicaCount: 1

image:
  repository: rouibahfaiza/rev_argocd2
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  APP_COLOR: red

testfile:
  name: "testfile.txt"
  content: "Bonjour depuis Kubernetes et ArgoCD"
ingress:
  enabled: true
  className: nginx
  host: faiza-app.local
  path: /
  pathType: Prefix
